name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Prepare Environment
        run: |
          curl -fsSL https://bun.sh/install | bash
          mkdir -p $HOME/.claude-code-router
          cat << EOF > $HOME/.claude-code-router/config.json
          {
            "log": true,
            "NON_INTERACTIVE_MODE": true,
            "OLLAMA_API_KEY": "${{ secrets.OLLAMA_API_KEY }}",
            "ANTHROPIC_BASE_URL": "https://ollama.com",
            "OPENAI_MODEL": "minimax-m2.5cloud"
          }
          EOF
        shell: bash

      - name: Start Claude Code Router
        run: |
          nohup ~/.bun/bin/bunx @musistudio/claude-code-router@1.0.8 start &
        shell: bash

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://ollama.com
          ANTHROPIC_AUTH_TOKEN: ollama # This value signals compatibility mode
        with:
          anthropic_api_key: ${{ secrets.OLLAMA_API_KEY }}
          additional_permissions: |
            actions: read
          # Pass custom instructions via prompt (appended to the user's prompt)
          prompt: |
            The project is already set up with all dependencies installed.
            The server is already running at localhost:3000. Logs from it
            are being written to logs.txt. If needed, you can query the
            db with the 'sqlite3' cli. If needed, use the mcp__playwright
            set of tools to launch a browser and interact with the app.

          # Pass MCP config and allowed_tools via claude_args
          claude_args: >-
            --print
            --allowed-tools Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_type,mcp__playwright__browser_navigate,mcp__playwright__browser_fill_form,mcp__playwright__browser_select_option,mcp__playwright__browser_hover,mcp__playwright__browser_drag,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_network_requests,mcp__playwright__browser_evaluate,mcp__playwright__browser_resize,mcp__playwright__browser_tabs,mcp__playwright__browser_wait_for,mcp__playwright__browser_handle_dialog,mcp__playwright__browser_install,mcp__playwright__browser_file_upload,mcp__playwright__browser_press_key,mcp__playwright__browser_navigate_back,mcp__playwright__browser_console_messages,mcp__playwright__browser_close
            --mcp-config